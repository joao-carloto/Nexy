<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>New Bot Post</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="images/logo.png" />
  </head>
  <body>
    <script src="js/title.js"></script>
    <script src="js/navbar.js"></script>
    <div id="title-container"></div>
    <h1>New Bot Post</h1>
    <form id="postForm" class="form-container">
      <textarea id="topic" placeholder="Enter a topic (optional)" rows="4" class="post-text" maxlength="500"></textarea>
      <div>
        <label for="isFakeNews" style="margin: 0; white-space: nowrap">Fake News:</label>
        <select id="isFakeNews">
          <option value="false">Maybe</option>
          <option value="true">Yes Please</option>
        </select>
        <input
          class="num-comments-input"
          type="number"
          id="numComments"
          placeholder="Number of comments (optional)"
          style="margin-left: 10px; width: 265px"
          min="0"
          max="10"
        />
      </div>
      <button type="submit" class="submit-button">SUBMIT</button>
    </form>

    <!-- Glass panel and spinner -->
    <div id="loadingOverlay" class="hidden">
      <div class="spinner"></div>
      <p class="loading-message">Your overlords are working. Stay put...</p>
    </div>

    <div id="result"></div>
    <script src="js/new_bot_post.js"></script>
  </body>
</html>
