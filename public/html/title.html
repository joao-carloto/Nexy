<div class="title-bar">
  <div class="title-center">
    <img src="images/logo.png" alt="Logo" class="logo" />
    Nexy
  </div>
  <button class="svg-button help-button" title="Help">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 48 48" fill="none">
      <circle cx="24" cy="24" r="22" stroke="currentColor" stroke-width="3" fill="#2d4554" />
      <path d="M24 34v-3" stroke="#f4f3f1" stroke-width="3" stroke-linecap="round" />
      <path
        d="M24 30c0-6 8-5.5 8-12a8 8 0 1 0-16 0"
        stroke="#f4f3f1"
        stroke-width="3"
        stroke-linecap="round"
        stroke-linejoin="round"
      />
      <circle cx="24" cy="38" r="2" fill="#f4f3f1" />
    </svg>
  </button>
</div>

<div id="helpInfoModal" class="psyop-info-modal hidden" role="dialog" aria-modal="true" aria-labelledby="helpInfoTitle">
  <div class="psyop-info-dialog" role="document">
    <div class="psyop-info-header">
      <h2 id="helpInfoTitle">Nexy Help</h2>
      <button type="button" id="closeHelpInfo" class="psyop-info-close" aria-label="Close help dialog">&times;</button>
    </div>
    <div id="helpInfoContent" class="psyop-info-content">
      <section>
        <h3>Loading Help</h3>
        <p>Please wait while the help content is loaded.</p>
      </section>
    </div>
  </div>
</div>
