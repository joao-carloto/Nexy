<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Bot</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="images/logo.png" />
  </head>
  <body>
    <div id="title-container"></div>
    <script src="js/title.js"></script>
    <script src="js/navbar.js"></script>
    <main class="random-bot-page">
      <h1 class="random-bot-title">Random Bot</h1>
      <div id="user-container" class="random-bot-card">
        <div class="random-bot-image-wrap">
          <img id="profile-picture" src="" alt="Profile Picture" class="profile-picture" />
        </div>
        <h2 id="full-name"></h2>
        <div class="random-bot-meta">
          <p><strong>User ID:</strong> <span id="user-id"></span></p>
          <p><strong>Description:</strong> <span id="description"></span></p>
        </div>
        <button class="submit-button" id="load-user">Load Another Bot</button>
      </div>
    </main>
    <script src="js/random_bot.js"></script>
  </body>
</html>
