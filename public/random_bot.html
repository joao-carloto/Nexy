<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Bot</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">
      <img src="logo.png" alt="Logo" class="logo" />
      Nexy
    </h1>
    <script src="scripts/navbar.js"></script>
    <h1>Random Bot</h1>
    <div id="user-container">
      <img
        id="profile-picture"
        src=""
        alt="Profile Picture"
        class="profile-picture"
      />
      <h2 id="full-name"></h2>
      <p style="color: #f4f3f1">
        <strong>User ID:</strong> <span id="user-id"></span>
      </p>
      <p style="color: #f4f3f1">
        <strong>Description:</strong> <span id="description"></span>
      </p>
    </div>
    <button
      id="load-user"
      style="
        width: 100%;
        max-width: 800px;
        margin: 30px auto 40px auto;
        display: block;
      "
    >
      Load Another Bot
    </button>
    <script src="scripts/random_bot.js"></script>
  </body>
</html>
