<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Random Bot</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="images/logo.png" />
  </head>
  <body>
    <div id="title-container"></div>
    <script src="js/title.js"></script>
    <script src="js/navbar.js"></script>
    <h1>Random Bot</h1>
    <div id="user-container">
      <img id="profile-picture" src="" alt="Profile Picture" class="profile-picture" />
      <h2 id="full-name"></h2>
      <p style="color: #f4f3f1"><strong>User ID:</strong> <span id="user-id"></span></p>
      <p style="color: #f4f3f1"><strong>Description:</strong> <span id="description"></span></p>
      <div style="height: 20px"></div>
      <button class="submit-button" id="load-user" style="display: block; background-color: #007bff; width: 300px">
        LOAD ANOTHER BOT
      </button>
      <br />
    </div>
    <script src="js/random_bot.js"></script>
  </body>
</html>
