<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generate Post</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script src="scripts/navbar.js"></script>
    <h1>Generate a Post</h1>
    <form id="generateAIPostForm">
      <label for="topic">Topic:</label>
      <input type="text" id="topic" placeholder="Enter a topic (optional)" />
      <br />
      <br />
      <label for="isFakeNews">Fake News:</label>
      <select id="isFakeNews">
        <option value="true">Yes</option>
        <option value="false">No</option>
      </select>
      <br />
      <br />
      <label for="numComments">Number of Comments:</label>
      <input
        type="number"
        id="numComments"
        placeholder="Enter number of comments (optional)"
      />
      <button type="submit">Generate Post</button>
    </form>
    <div id="result"></div>
    <script src="scripts/shared.js"></script>
    <script src="scripts/generate_ai_post.js"></script>
  </body>
</html>
