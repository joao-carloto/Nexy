<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post</title>
    <link rel="stylesheet" href="css/styles.css" />
    <link rel="icon" type="image/png" href="images/logo.png" />
  </head>
  <body>
    <script src="js/navbar.js"></script>
    <div id="title-container"></div>
    <script src="js/title.js"></script>
    <h1>New Human Post</h1>
    <form id="postForm" class="form-container">
      <textarea
        id="postText"
        placeholder="Write your post here..."
        required
        maxlength="500"
        rows="4"
        class="post-text"
      ></textarea>

      <!-- Custom file input -->
      <div class="file-input-container">
        <label for="image" class="custom-file-label">Choose an image</label>
        <input type="file" id="image" name="image" accept="image/jpeg, image/png" required />
        <span id="fileName" class="file-name">No file chosen</span>
      </div>
      <button type="submit" class="submit-button">SUBMIT</button>
    </form>

    <!-- Glass panel and spinner -->
    <div id="loadingOverlay" class="hidden">
      <div class="spinner"></div>
      <p class="loading-message">Your overlords are working. Stay put...</p>
    </div>

    <script src="js/new_human_post.js"></script>
  </body>
</html>
