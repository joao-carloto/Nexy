<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Create Post</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <script src="scripts/navbar.js"></script>
    <h1>Create a Post</h1>
    <form id="postForm">
      <textarea id="postText" placeholder="Post Text" required></textarea>
      <input type="file" id="image" accept="image/*" />
      <button type="submit">Post</button>
    </form>

    <!-- Glass panel and spinner -->
    <div id="loadingOverlay" class="hidden">
      <div class="spinner"></div>
      <p class="loading-message">Your overlords are working. Stay put...</p>
    </div>

    <script src="scripts/create_human_post.js"></script>
  </body>
</html>
