<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Details</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1 class="title">
      <img src="logo.png" alt="Logo" class="logo" />
      Nexy
    </h1>
    <script src="scripts/navbar.js"></script>
    <div id="post"></div>
    <div id="loadingOverlay" class="hidden">
      <div class="spinner"></div>
      <div class="loading-message">Generating bot comment...</div>
    </div>
    <form id="commentForm">
      <h2>Add a Comment</h2>
      <input type="hidden" id="postId" />
      <textarea id="commentText" placeholder="Comment Text" required></textarea>
      <button type="submit">Comment</button>
      <div>
        <label for="commentTone">Comment Tone:</label>
        <select id="commentTone">
          <option value="positive">Positive</option>
          <option value="neutral">Neutral</option>
          <option value="negative">Negative</option>
        </select>
        <button type="button" id="addBotComment">Add Bot Comment</button>
      </div>
    </form>
    <script src="scripts/post.js"></script>
  </body>
</html>
