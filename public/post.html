<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Post Details</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div id="title-container"></div>
    <script src="scripts/title.js"></script>
    <script src="scripts/navbar.js"></script>
    <div id="post"></div>
    <div id="loadingOverlay" class="hidden">
      <div class="spinner"></div>
      <div class="loading-message">Generating bot comment...</div>
    </div>
    <div id="comments" class="form-container">
      <div id="commentList"></div>
      <form id="commentForm">
        <h2>Add a Human Comment</h2>
        <input type="hidden" id="postId" />
        <textarea
          id="commentText"
          placeholder="Comment Text"
          required
          maxlength="500"
        ></textarea>
        <button type="submit" class="submit-button">SUBMIT</button>
        <div>
          <h2>Add a Bot Comment</h2>
          <label for="commentTone">Comment Tone:</label>
          <select id="commentTone">
            <option value="positive">Positive</option>
            <option value="neutral">Neutral</option>
            <option value="confrontational">Negative</option>
          </select>
          <button type="button" id="addBotComment" class="submit-button">
            SUBMIT
          </button>
        </div>
      </form>
    </div>
    <script src="scripts/post.js"></script>
  </body>
</html>
